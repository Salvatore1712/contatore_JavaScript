<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatore in JS</title>
    <link rel="stylesheet" href="./dist/css/main.css">
    
    <!-- FAVICON -->
     <link rel="icon" type="image/png" href="./img/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./img/favicon/favicon.svg" />
    <link rel="shortcut icon" href="./img/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./img/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="./img/favicon/site.webmanifest" />

    <!-- FONT GOOGLE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- PAGINA -->
    <div id="container">
        <!-- HEADER -->
        <header class="header grid-item">
            <img src="/img/logo_counter.svg" alt="logo javascript counter image">
            <nav class="nav">
                <span class="nav__icon">-> SCEGLI IL GIOCO <-</span>
                <ul class="nav__list menu__show">
                    <li>CONTATORE</li>
                    <li>PARI DISPARI</li>
                </ul>
            </nav>
        </header>

        <!-- ASIDE -->
        <aside class="aside">
            <h4 class="aside__title">DASHBOARD</h4>
            <div class="aside__box">
                <a href="#" class="aside__counter__link">
                    <img src="/src/img/image_conter_app.svg" alt="link counter game image" width="50">
                </a>
                <p class="aside__counter__text">COUNTER</p>
            </div>

            <div class="aside__box">
                <a href="#" class="aside__counter__link">
                    <img src="/src/img/image_even_odd_app.svg" alt="link even odd game image" width="50">
                </a>
                <p class="aside__counter__text">COUNTER</p>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main grid-item">
            <div class="main__titles">
                <h4 class="main__titles__big"></h4>
            </div>

            <!-- BOX CONTATORE -->
            <div class="main__contatore">
                
                <div class="main__contatore__numero">
                    <!-- INSERIRE QUI NUMERO CONTATORE -->
                </div>
                <span class="main__text">SCEGLI UN GIOCO DAL MENU</span>
                <div class="main__button">
                    <!-- INSERIRE BOTTONI DINAMICI -->
                </div>
                
            </div>
            
        </main> 
        

        <!-- SIDEBAR -->
        <section class="sidebar grid-item">
            <div class="sidebar__score">
                <h3 class="sidebar__title">PANNELLO PUNTEGGIO</h3>
                <!-- INFO PUNTEGGIO -->
                <ul class="sidebar__score__info">
                    <li><span id="info-name"></span></li>
                    <li>PUNTEGGIO GIOCATORE.... <span id="info-score"></span></li>
                    <li>PUNTEGGIO CPU.... <span id="info-cpu"></span></li>
                </ul>
            </div>
        </section>

        
        <!-- footer -->
        <footer class="footer">
            <p>© SALVATORE DE ROMA - 2026</p>
            <a href="salvatorederoma.it" target="_blank">salvatorederoma.it</a>
            <a href="mailto:info@salvatorederoma.it">info@salvatorederoma.it</a>
        </footer>
    </div>

    <!-- SCRIPT -->
    <script type="module" src="/src/js/main.js"></script>
    <script src="./src/js/menu_action.js"></script>
</body>
</html>
