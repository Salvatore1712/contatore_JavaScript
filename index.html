<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatore in JS</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <!-- PAGINA -->
    <div id="container-grid">
        <!-- HEADER -->
        <header id="header" class="grid-item">
            <h2>Contatore in</h2>
            <h1>JAVASCRIPT</h1>
            <div id="dark-mode">
                <!-- inserire bottone dinamicamente -->
            </div>
        </header>

        <main id="hero-section" class="grid-item">
            <p class="code">CA_7 VER-02 17-12-1984</p>
            <div id="box-main">
                <div class="title-counter">
                    + COUNTER STRIKE +
                </div>
                <!-- display game -->
                <div class="box-contatore">
                    
                    <div class="round uno"></div>
                    <div class="round due"></div>
                    <div class="round tre"></div>
                    <div class="round quattro"></div>

                    <div class="box-numero">
                        <p class="contatore"></p>
                    </div>
                </div>

                <span class="nointiendo">Nointiendo NES</span>
                <div class="box-button">
                    <!-- <button class="btn reset">RESET</button>
                    <button class="btn">-</button>
                    <button class="btn">+</button> -->
                </div>
                
            </div>
        </main> 
        <!-- fine main hero-->

        <section class="info">
            <!-- informazioni punteggio -->
        </section>

        <!-- footer -->
        <footer>
            © Salvatore De Roma 2026
        </footer>

        


    </div>

    <!-- javascript -->
    <script src="./js/contatore.js"></script>
    <script src="./js/darkLightMode.js"></script>
    <script src="./js/score_info.js"></script>
     
</body>
</html>
