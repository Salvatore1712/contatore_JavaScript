<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatore in JS</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <!-- PAGINA -->
    <div id="container-grid">
        <!-- HEADER -->
        <header id="header" class="grid-item">
            <h1>JS COUNTER.exe</h1>
            <span>v_1.2</span>
            <nav id="nav-bar">
                <span class="icon-menu">MENU</span>
                <ul class="menu-lista">
                    <li><a href="">conatatore</a></li>
                    <li><a href="">cronometro</a></li>
                    <li><a href="">pari dispari</a></li>
                </ul>
            </nav>
        </header>

        <!-- ASIDE -->
        <aside id="aside" class="grid-item">
            aside
        </aside>

        <!-- MAIN -->
        <main id="main" class="grid-item">
            <div id="title-main">
                <h4>COUNTER MODULE_ </h4>
                <h6>root/project/destroy</h6>
            </div>

            <div class="box-contatore">
                <!-- inserire contatore -->
                <div id="numero">
                    001
                </div>
                <span>+++++++++++++++++++++++</span>
                <div class="box-button">
                    <!-- inserire bottoni -->
                     <button class="btn reset">RESET</button>
                     <button class="btn">DECR</button>
                     <button class="btn">INCR</button>
                </div>
                
            </div>
            
            <div class="random-text">
                    <p>BOOT SEQUENCE START</p>
                    <p>MEMORY CHECK: <span>OK</span></p>
            </div>
        </main> 
        

        <!-- SIDEBAR -->
        <section id="sidebar" class="grid-item">
            sidebar
            <p class="coins">insert coin(s)</p>
            <!-- informazioni punteggio -->
        </section>

        <!-- footer -->
        <footer class="grid-item" id="footer">
            © Salvatore De Roma 2026
        </footer>

        


    </div>

    <!-- javascript -->
    <script src="./js/contatore.js"></script>
    <script src="./js/darkLightMode.js"></script>
    <script src="./js/score_info.js"></script>
     
</body>
</html>
